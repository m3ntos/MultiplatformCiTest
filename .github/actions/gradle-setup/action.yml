name: gradle-setup
description: Set up the JDK and Gradle for this Kotlin Multiplatform build.

# Reused by every job so JDK + Gradle setup lives in one place.
runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        # Must match gradle/gradle-daemon-jvm.properties.
        # Matching it means Gradle reuses this JDK for the build JVM
        # instead of downloading its own on every run.
        distribution: corretto
        java-version: "21"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5
