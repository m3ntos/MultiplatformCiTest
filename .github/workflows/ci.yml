name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel a still-running pipeline when a newer commit lands on the same branch/PR.
# On main we never cancel — every commit's run is allowed to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # Placeholder, always passes for now.
      - name: Lint (placeholder)
        run: echo "No lint configured yet; passing."

  common-tests:
    name: Common Tests (JVM)
    runs-on: ubuntu-latest
    needs: lint
    # dorny/test-reporter needs checks:write to publish the results check run.
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK and Gradle
        uses: ./.github/actions/gradle-setup

      - name: Run shared unit tests (commonTest + androidHostTest)
        run: ./gradlew :shared:testAndroidHostTest

      # Parses the JUnit XML into a Checks-tab report + inline PR annotations.
      # if: always() so failing tests are still reported (the main reason for it).
      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit test results
          path: "**/build/test-results/**/*.xml"
          reporter: java-junit

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  android-build:
    name: Android build
    runs-on: ubuntu-latest
    needs: common-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK and Gradle
        uses: ./.github/actions/gradle-setup

      - name: Assemble Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/*.apk

  ios-build:
    name: iOS build
    # Compose Multiplatform 1.11 references iOS 26 SDK symbols (UIViewLayoutRegion,
    # UIUtilities, SwiftUICore), so linking needs Xcode 26. macos-latest still ships
    # Xcode 16.x (iOS 18 SDK) and fails to link; macos-26 defaults to Xcode 26.x.
    runs-on: macos-26
    needs: common-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK and Gradle
        uses: ./.github/actions/gradle-setup

      - name: Build iOS app (simulator, no signing)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v7
        with:
          name: ios-app
          path: build/ios/Build/Products/Debug-iphonesimulator/*
